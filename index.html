<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>감사카드 출고 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F2;--sf:#FFF;--sf2:#F0EDE8;--bd:#E2DDD6;--bd2:#CBC4BA;--tx:#1A1714;--tx2:#6B6560;--tx3:#9E9890;--ac:#C17B3F;--ac2:#FDF3E8;--ac3:#8B5220;--bl:#2B6CB0;--bl2:#EBF4FF;--gn:#276749;--gn2:#E6F4EE;--rd:#9B2335;--rd2:#FDEDF0;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sb{background:var(--tx);color:#fff;padding:24px 16px;display:flex;flex-direction:column;height:100vh}
.logo{display:flex;align-items:center;gap:10px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:24px}
.lm{width:34px;height:34px;background:var(--ac);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-family:"DM Mono",monospace;font-weight:700}
.mn{display:flex;flex-direction:column}
.top{background:var(--sf);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.tt{font-size:15px;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--bd2);background:var(--sf);font-family:inherit}
.btn.pr{background:var(--ac);color:#fff;border-color:var(--ac)}
.ct{padding:20px 24px;flex:1}
.cpw{display:grid;grid-template-columns:1fr 360px;gap:14px}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.cn{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd)}
.cg{display:grid;grid-template-columns:repeat(7,1fr)}
.cel{min-height:80px;padding:8px;border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);cursor:pointer}
.cel.sel{background:var(--ac2);box-shadow:inset 0 0 0 2px var(--ac)}
.dn{font-size:12px;margin-bottom:4px}
.uf{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-top:20px;display:none}
.uf.show{display:block}
.ctg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:15px}
.ctb{padding:10px 5px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--sf2);font-size:11px;cursor:pointer;text-align:center}
.ctb.selected{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:700}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:15px}
.fgr{display:flex;flex-direction:column;gap:5px}
.fgr label{font-size:11px;font-weight:700;color:var(--tx2)}
.fgr input{padding:8px;border:1px solid var(--bd);border-radius:var(--rs);font-family:inherit}
.ov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);align-items:center;justify-content:center;z-index:9999}
.ov.show{display:flex}
.tst{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;opacity:0;transition:0.3s;z-index:9999}
.tst.show{opacity:1}
.item-card{background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:8px; border:1px solid var(--bd)}
</style>
</head>
<body>

<div class="ov" id="ov">🔄 처리 중...</div>
<div class="tst" id="tst"></div>

<div class="app">
  <aside class="sb">
    <div class="logo"><div class="lm">SL</div><div><div class="lt">설로인</div></div></div>
    <div style="font-size:13px; color:rgba(255,255,255,0.6)">감사카드 관리</div>
  </aside>
  <main class="mn">
    <div class="top">
      <div class="tt">감사카드 출고 관리</div>
      <button class="btn pr" id="regBtn">+ 감사카드 등록</button>
    </div>
    <div class="ct">
      <div class="cpw">
        <div class="cc">
          <div class="cn">
            <button id="prevM">◀</button>
            <div id="cml" style="font-weight:700"></div>
            <button id="nextM">▶</button>
          </div>
          <div class="cg" id="cg"></div>
        </div>
        <div style="background:#fff; border:1px solid var(--bd); padding:20px; border-radius:10px;">
          <h3 id="pdt">날짜를 선택하세요</h3>
          <div id="pb" style="margin-top:15px"></div>
        </div>
      </div>

      <div class="uf" id="uf">
        <h3>새 감사카드 등록</h3>
        <div style="margin:15px 0">
          <div style="font-size:12px; font-weight:700; margin-bottom:8px">카드 종류 <span style="color:red">*</span></div>
          <div class="ctg" id="typeGroup">
            <button class="ctb" data-val="상시감카">상시감카</button>
            <button class="ctb" data-val="메세지감카">메세지감카</button>
            <button class="ctb" data-val="자체감카">자체감카</button>
            <button class="ctb" data-val="감카없음">감카없음</button>
          </div>
        </div>
        <div class="fg">
          <div class="fgr"><label>출고일자 *</label><input type="date" id="fd"></div>
          <div class="fgr"><label>수량 *</label><input type="number" id="fq" placeholder="0"></div>
          <div class="fgr"><label>고객사명 *</label><input type="text" id="fc" placeholder="업체명 입력"></div>
          <div class="fgr"><label>담당자명</label><input type="text" id="fm" placeholder="성함 입력"></div>
        </div>
        <div class="fgr" style="margin-bottom:15px">
          <label>메모</label>
          <input type="text" id="fmo" placeholder="기타 참고사항">
        </div>
        <div style="text-align:right; gap:10px; display:flex; justify-content:flex-end">
          <button class="btn" id="cancelBtn">취소</button>
          <button class="btn pr" id="saveBtn">데이터 저장하기</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = "https://mvjbvyeiyrmtgnbydghr.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12amJ2eWVpeXJtdGduYnlkZ2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTczMzAsImV4cCI6MjA5MDY3MzMzMH0.CsWrPRbXLcmVmYyj85-fDu_8BiaRNmCHDPw-30a_pEs";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let Y, M, SD = null, AD = {}, selectedType = "";

window.onload = () => {
  let n = new Date(); Y = n.getFullYear(); M = n.getMonth();
  init();
  loadData();
};

function init() {
  document.getElementById("prevM").onclick = () => { M--; if(M<0){M=11; Y--;} renderCalendar(); };
  document.getElementById("nextM").onclick = () => { M++; if(M>11){M=0; Y++;} renderCalendar(); };
  document.getElementById("regBtn").onclick = () => document.getElementById("uf").classList.toggle("show");
  document.getElementById("cancelBtn").onclick = () => document.getElementById("uf").classList.remove("show");
  document.getElementById("saveBtn").onclick = saveCard;

  document.querySelectorAll(".ctb").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".ctb").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedType = btn.dataset.val;
    };
  });
}

async function loadData() {
  showOv(true);
  const { data, error } = await sb.from("cards").select("*");
  showOv(false);
  if(error) return showToast("데이터 로드 실패");
  
  AD = {};
  data.forEach(r => {
    if(!AD[r.ship_date]) AD[r.ship_date] = [];
    AD[r.ship_date].push(r);
  });
  renderCalendar();
}

function renderCalendar() {
  const cg = document.getElementById("cg"); cg.innerHTML = "";
  document.getElementById("cml").textContent = `${Y}년 ${M+1}월`;
  
  let firstDay = new Date(Y, M, 1).getDay();
  let lastDate = new Date(Y, M+1, 0).getDate();

  for(let i=0; i<firstDay; i++) cg.innerHTML += `<div class="cel"></div>`;
  for(let i=1; i<=lastDate; i++) {
    let dStr = `${Y}-${String(M+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    let cell = document.createElement("div");
    cell.className = `cel ${SD === dStr ? 'sel' : ''}`;
    cell.innerHTML = `<div class="dn" style="${AD[dStr] ? 'color:var(--ac);font-weight:700' : ''}">${i}</div>`;
    if(AD[dStr]) cell.innerHTML += `<div style="font-size:10px; color:var(--tx3)">건수: ${AD[dStr].length}</div>`;
    cell.onclick = () => { SD = dStr; renderCalendar(); showDayInfo(dStr); };
    cg.appendChild(cell);
  }
}

function showDayInfo(date) {
  document.getElementById("pdt").textContent = date;
  const pb = document.getElementById("pb"); pb.innerHTML = "";
  if(AD[date]) {
    AD[date].forEach(r => {
      pb.innerHTML += `<div class="item-card">
        <b>${r.company}</b><br>
        <span style="font-size:12px; color:var(--tx2)">${r.card_type} | ${r.qty}개 | ${r.manager || '담당자미정'}</span>
      </div>`;
    });
  } else {
    pb.innerHTML = "출고 내역이 없습니다.";
  }
}

async function saveCard() {
  const dv = document.getElementById("fd").value;
  const qty = parseInt(document.getElementById("fq").value);
  const co = document.getElementById("fc").value.trim();
  const mg = document.getElementById("fm").value.trim();
  const mo = document.getElementById("fmo").value.trim();

  if (!selectedType) return showToast("카드 종류를 선택해주세요.");
  if (!dv || !co || isNaN(qty)) return showToast("필수 입력 항목을 확인해주세요.");

  showOv(true);

  // 테이블 컬럼 불일치로 인한 400 에러를 방지하기 위해 
  // 가장 확실한 기본 컬럼들만 먼저 전송합니다.
  const { error } = await sb.from("cards").insert([{
    ship_date: dv,
    company: co,
    manager: mg,
    qty: qty,
    card_type: selectedType,
    memo: mo
  }]);

  showOv(false);
  if(error) {
    console.error("에러상세:", error);
    alert("저장 실패했습니다.\n사유: " + error.message);
  } else {
    showToast("성공적으로 저장되었습니다!");
    document.getElementById("uf").classList.remove("show");
    resetForm();
    loadData();
  }
}

function resetForm() {
  document.getElementById("fd").value = "";
  document.getElementById("fq").value = "";
  document.getElementById("fc").value = "";
  document.getElementById("fm").value = "";
  document.getElementById("fmo").value = "";
  document.querySelectorAll(".ctb").forEach(b => b.classList.remove("selected"));
  selectedType = "";
}

function showOv(v) { document.getElementById("ov").classList.toggle("show", v); }
function showToast(m) {
  const t = document.getElementById("tst"); t.textContent = m; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
